<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Cafe v4 - Multi Satuan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .app-container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e272e; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #485460; }
        
        /* Layout Input & Satuan */
        .input-row { display: flex; gap: 10px; }
        .input-row input { flex: 2; padding: 14px; border: 2px solid #edeff2; border-radius: 12px; font-size: 16px; outline: none; }
        .input-row select { flex: 1; padding: 14px; border: 2px solid #edeff2; border-radius: 12px; font-size: 16px; background: #f8f9fa; }
        
        select#produk { width: 100%; padding: 14px; border: 2px solid #edeff2; border-radius: 12px; font-size: 16px; margin-bottom: 10px; }
        
        .fraction-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-frac { flex: 1; padding: 10px; background: #dfe6e9; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .btn-utama { width: 100%; padding: 18px; background: #05c46b; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        .laporan-section { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #dcdde1; padding: 12px; text-align: left; font-size: 13px; }
        th { background: #f1f2f6; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-download { flex: 2; background: #3c40c6; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-reset { flex: 1; background: #ff3f34; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #notif { display: none; text-align: center; color: #05c46b; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>☕ Cafe Inventory v4</h2>

    <div class="form-group">
        <label>Pilih Nama Barang:</label>
        <select id="produk">
            <option value="0">-- Pilih Barang --</option>
            <option value="0">Air Mineral Aquviva (0g)</option>
            <option value="0">Air Mineral Vit (0g)</option>
            <option value="0">Buah Leci (0g)</option>
            <option value="0">Buah Lemon (0g)</option>
            <option value="11">Coca Cola 250ml (11g)</option>
            <option value="23">Coca Cola 390ml (23g)</option>
            <option value="38">Coca Cola 1 Liter (38g)</option>
            <option value="0">Creamer (0g)</option>
            <option value="0">Cup Datar 16 oz (0g)</option>
            <option value="0">Cup Oval 14 oz (0g)</option>
            <option value="0">Cup Oval 16 oz (0g)</option>
            <option value="60">Denali Sirup Butterscotch (60g)</option>
            <option value="60">Denali Sirup Hazelnut (60g)</option>
            <option value="60">Denali Sirup Leci (60g)</option>
            <option value="60">Denali Sirup Peach (60g)</option>
            <option value="60">Denali Sirup Strawberry (60g)</option>
            <option value="60">Denali Sirup Vanilla (60g)</option>
            <option value="0">Espresso (0g)</option>
            <option value="11">Fanta 250ml (11g)</option>
            <option value="23">Fanta 390ml (23g)</option>
            <option value="38">Fanta 1 Liter (38g)</option>
            <option value="124">Gula Pasir (124g)</option>
            <option value="0">Half n Half (0g)</option>
            <option value="0">Hydro Coco (0g)</option>
            <option value="0">Indomie Aceh (0g)</option>
            <option value="0">Indomie Goreng (0g)</option>
            <option value="0">Indomie Kuah (0g)</option>
            <option value="161">Kopi Robusta (161g)</option>
            <option value="300">Marjan Cocopandan (300g)</option>
            <option value="340">Marjan Lemon (340g)</option>
            <option value="300">Marjan Mangga (300g)</option>
            <option value="0">Marshmallow (0g)</option>
            <option value="0">Nescafe (0g)</option>
            <option value="0">Palm Sugar (0g)</option>
            <option value="169">Powder Coklat (169g)</option>
            <option value="169">Powder Matcha (169g)</option>
            <option value="169">Powder Red Velvet (169g)</option>
            <option value="169">Powder Taro (169g)</option>
            <option value="0">Redclay (0g)</option>
            <option value="0">Regal (0g)</option>
            <option value="0">Richgold (0g)</option>
            <option value="0">Salt (0g)</option>
            <option value="133">Salted Caramel (133g)</option>
            <option value="0">Santan (0g)</option>
            <option value="0">Simple Sirup (0g)</option>
            <option value="50">SKM (50g)</option>
            <option value="11">Sprite 250ml (11g)</option>
            <option value="23">Sprite 390ml (23g)</option>
            <option value="38">Sprite 1 Liter (38g)</option>
            <option value="40">Susu UHT (40g)</option>
            <option value="123">Susu Racik (123g)</option>
            <option value="0">Teh Bandulan (0g)</option>
            <option value="175">Teh Racik (175g)</option>
            <option value="41">Teh Telang (41g)</option>
            <option value="0">Teh Villa (0g)</option>
            <option value="0">Telur (0g)</option>
            <option value="0">Uwuh (0g)</option>
            <option value="0">Yakult Mangga (0g)</option>
            <option value="0">Yakult Original (0g)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Masukkan Jumlah & Satuan:</label>
        <div class="input-row">
            <input type="number" id="beratInput" placeholder="Angka..." step="0.01">
            <select id="satuan">
                <option value="gr">gram</option>
                <option value="ml">ml</option>
                <option value="pcs">pcs</option>
                <option value="btl">botol</option>
            </select>
        </div>
        
        <div class="fraction-btns">
            <button class="btn-frac" onclick="setFrac(0.25)">¼</button>
            <button class="btn-frac" onclick="setFrac(0.5)">½</button>
            <button class="btn-frac" onclick="setFrac(0.75)">¾</button>
        </div>
    </div>

    <button class="btn-utama" onclick="prosesData()">HITUNG & SIMPAN KE LAPORAN</button>
    <div id="notif">✓ Tersimpan!</div>

    <div class="laporan-section">
        <table id="tabelLaporan">
            <thead>
                <tr>
                    <th>Barang</th>
                    <th>Stok Akhir</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div class="action-btns">
            <button class="btn-download" onclick="downloadCSV()">⬇️ DOWNLOAD CSV</button>
            <button class="btn-reset" onclick="resetLaporan()">❌ RESET</button>
        </div>
    </div>
</div>

<script>
    function setFrac(val) { document.getElementById('beratInput').value = val; }

    function prosesData() {
        const selectProduk = document.getElementById('produk');
        const beratInput = document.getElementById('beratInput');
        const satuan = document.getElementById('satuan').value;
        
        if(selectProduk.value === "0") { alert("Pilih barang!"); return; }
        if (beratInput.value === "") { alert("Isi jumlah!"); return; }

        const namaProduk = selectProduk.options[selectProduk.selectedIndex].text.split(' (')[0];
        const wadah = parseFloat(selectProduk.value);
        const total = parseFloat(beratInput.value);
        
        // Logika: Hanya kurangi wadah jika satuan adalah 'gr' atau 'ml'
        let hasil = total;
        if (satuan === "gr" || satuan === "ml") {
            hasil = total - wadah;
        }
        if (hasil < 0) hasil = 0;

        const tbody = document.querySelector('#tabelLaporan tbody');
        const row = tbody.insertRow(0);
        row.innerHTML = `
            <td>${namaProduk}</td>
            <td><b>${hasil % 1 !== 0 ? hasil.toFixed(2) : hasil} ${satuan}</b></td>
            <td><button style="background:#ff5e57;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;" onclick="this.parentElement.parentElement.remove()">Hapus</button></td>
        `;
        
        beratInput.value = "";
        const notif = document.getElementById('notif');
        notif.style.display = "block";
        setTimeout(() => { notif.style.display = "none"; }, 1500);
    }

    function downloadCSV() {
        let csv = 'Nama Barang,Stok Akhir\n';
        const rows = document.querySelectorAll('#tabelLaporan tbody tr');
        rows.forEach(row => {
            const cols = row.querySelectorAll('td');
            csv += `${cols[0].innerText},${cols[1].innerText}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'rekapan_stok_cafe.csv';
        a.click();
    }

    function resetLaporan() {
        if(confirm("Reset semua rekapan?")) document.querySelector('#tabelLaporan tbody').innerHTML = "";
    }
</script>

</body>
</html>
